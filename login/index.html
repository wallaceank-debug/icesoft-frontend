<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icesoft - Login Restrito</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">🍦 Icesoft</div>
            <h2>Acesso Restrito</h2>
            <p>Área exclusiva para funcionários</p>
            
            <form id="form-login">
                <div class="input-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" required placeholder="Digite seu usuário">
                </div>
                
                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" required placeholder="Digite sua senha">
                </div>
                
                <p id="mensagem-erro" class="erro-oculto">Usuário ou senha incorretos!</p>
                
                <button type="submit" class="btn-entrar">Entrar no Sistema</button>
            </form>
        </div>
    </div>
    <script src="./app.js"></script>
</body>
</html>
