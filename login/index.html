<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icesoft - Login Restrito</title>
    <link rel="stylesheet" href="login/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        
        <!-- O Card Branco -->
        <div class="login-card">
            
            <div class="logo-area">
                <span class="icone">🍦</span>
                <span class="texto">Icesoft</span>
            </div>
            
            <h2>Área Restrita</h2>
            <p>Acesse o sistema com suas credenciais.</p>
            
            <form id="form-login">
                <div class="input-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" required placeholder="Seu usuário" autocomplete="username">
                </div>
                
                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" required placeholder="Sua senha" autocomplete="current-password">
                </div>
                
                <div id="mensagem-erro" class="erro-oculto">
                    ⚠️ Usuário ou senha incorretos!
                </div>
                
                <button type="submit" id="btn-submit" class="btn-entrar">Acessar Sistema</button>
            </form>
            
        </div>
        
    </div>

    <script src="login/app.js"></script>
</body>
</html>
