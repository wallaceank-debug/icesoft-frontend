<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icesoft - PDV (Frente de Caixa)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="pdv-header">
        <div class="logo">
            <h1>🍦 Icesoft PDV</h1>
            <span class="status-caixa">Caixa Aberto - Operador: Wallace</span>
        </div>
        <div class="controles-topo">
            <button class="btn-mesas">Mesas/Comandas</button>
            <button class="btn-fechar-caixa">Fechar Caixa</button>
        </div>
    </header>

    <main class="pdv-container">
        
        <section class="pdv-produtos">
            <div class="categorias-pdv">
                <button class="btn-categoria ativo">Todas</button>
                <button class="btn-categoria">Massas</button>
                <button class="btn-categoria">Açaí</button>
                <button class="btn-categoria">Picolés</button>
            </div>
            
            <div id="grid-produtos" class="grid-produtos">
                <p>Carregando produtos...</p>
            </div>
        </section>

        <aside class="pdv-carrinho">
            <div class="carrinho-header">
                <h2>Venda Atual</h2>
                <span id="pdv-comanda">Balcão</span>
            </div>
            
            <div id="pdv-lista-itens" class="pdv-lista-itens">
                </div>

            <div class="pdv-resumo-valores">
                <div class="linha-valor">
                    <span>Subtotal:</span>
                    <span id="pdv-subtotal">R$ 0,00</span>
                </div>
                <div class="linha-valor desconto">
                    <span>Desconto:</span>
                    <span id="pdv-desconto">R$ 0,00</span>
                </div>
                <div class="linha-valor total">
                    <span>Total a Pagar:</span>
                    <strong id="pdv-total">R$ 0,00</strong>
                </div>
            </div>

            <div class="pdv-acoes">
                <button class="btn-cancelar" id="btn-cancelar-venda">Cancelar (F4)</button>
                <button class="btn-pagamento" id="btn-cobrar">Cobrar (F12)</button>
            </div>
        </aside>

<div id="modal-pagamento" class="modal-overlay" style="display: none;">
            <div class="modal-box">
                <div class="modal-header">
                    <h2>Cobrar Venda</h2>
                    <button id="btn-fechar-pagamento">✖</button>
                </div>
                
                <div class="modal-body">
                    <div class="resumo-pagamento">
                        <div class="linha-pgto">
                            <span>Subtotal:</span>
                            <span id="pag-subtotal">R$ 0,00</span>
                        </div>
                        <div class="linha-desconto-input">
                            <label>Desconto (R$):</label>
                            <input type="number" id="input-desconto" value="0.00" min="0" step="0.50">
                            <button id="btn-aplicar-desconto">Aplicar</button>
                        </div>
                        <h3 class="total-destaque">Total a Pagar: <strong id="pag-total">R$ 0,00</strong></h3>
                    </div>

                    <div class="formas-pagamento">
                        <button class="btn-forma-pag" data-tipo="Dinheiro">💵 Dinheiro</button>
                        <button class="btn-forma-pag" data-tipo="Cartao">💳 Cartão</button>
                        <button class="btn-forma-pag" data-tipo="Pix">💠 Pix</button>
                    </div>

                    <div id="area-troco" style="display: none;">
                        <label>Valor Recebido do Cliente (R$):</label>
                        <input type="number" id="input-recebido" value="0.00" min="0" step="1">
                        <p>Troco: <strong id="valor-troco">R$ 0,00</strong></p>
                    </div>
                </div>

                <div class="modal-footer">
                    <button id="btn-confirmar-venda" class="btn-sucesso-pgto">Finalizar Venda (Enter)</button>
                </div>
            </div>
        </div>

    </main>

    <script src="app.js"></script>
</body>
</html>
