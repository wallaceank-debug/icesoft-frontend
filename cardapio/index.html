<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icesoft - Cardápio Digital</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="overlay-loja-fechada" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; justify-content:center; align-items:center; flex-direction:column; text-align:center; padding: 20px;">
        <h1 style="color: #f44336; font-size: 4rem; margin-bottom: 10px;">🛑</h1>
        <h2 style="color: white; font-family: 'Poppins', sans-serif; font-size: 2rem; margin-bottom: 15px;">Loja Fechada!</h2>
        <p style="color: #ccc; font-family: 'Poppins', sans-serif; font-size: 1.1rem; max-width: 400px;">Nosso delivery está suspenso no momento. Retornaremos em breve durante nosso horário de funcionamento!</p>
    </div>    
    <header class="header-loja">
        <div class="logo-area">
            <h1>🍦 Icesoft</h1>
        </div>
        <div class="busca-area">
            <input type="text" id="busca-produtos" placeholder="O que você quer pedir hoje?">
        </div>
    </header>

    <nav class="stories-container">
        <div class="story-item">🍨<br>Massas</div>
        <div class="story-item">🍧<br>Açaí</div>
        <div class="story-item">🍡<br>Picolés</div>
        <div class="story-item">🥤<br>Bebidas</div>
    </nav>

    <main id="lista-produtos">
        <h2>Cardápio</h2>
        <p>Carregando os melhores sorvetes da região...</p>
    </main>

    <div id="carrinho-flutuante" class="carrinho-oculto">
        <div class="carrinho-info">
            <span id="carrinho-qtd">0 itens</span>
            <span id="carrinho-total">R$ 0,00</span>
        </div>
        <button onclick="finalizarPedidoWhatsApp()" class="btn-whatsapp">Fazer Pedido 📱</button>
    </div>

    <div id="modal-opcoes" class="modal-oculto" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); justify-content:center; align-items:flex-end; z-index:3000;">
        <div style="background:white; width:100%; max-width:500px; border-top-left-radius:25px; border-top-right-radius:25px; padding:20px; max-height:85vh; overflow-y:auto; animation: slideUp 0.3s ease-out;">
            <div id="detalhes-produto-topo" style="text-align:center; margin-bottom:20px;">
                </div>

            <div id="container-grupos-opcoes">
                </div>

            <div style="margin-top:20px; padding:10px; background:#fff0f5; border-radius:15px; display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <span style="font-size:0.9rem; color:#666;">Total do item:</span><br>
                    <strong id="preco-dinamico" style="font-size:1.3rem; color:#e91e63;">R$ 0,00</strong>
                </div>
                <button onclick="confirmarEscolhasEAdicionar()" style="background:#e91e63; color:white; border:none; padding:15px 30px; border-radius:30px; font-weight:bold; cursor:pointer; box-shadow:0 4px 10px rgba(233,30,99,0.3);">
                    Adicionar à sacola
                </button>
            </div>
            <button onclick="fecharModalOpcoes()" style="width:100%; background:none; border:none; color:#999; padding:15px; margin-top:10px; cursor:pointer;">Voltar ao cardápio</button>
        </div>
    </div>

    <div id="modal-checkout" class="modal-oculto" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:4000;">
        <div class="modal-conteudo" style="background:white; padding:25px; border-radius:20px; width:90%; max-width:400px; display:flex; flex-direction:column; gap:15px; max-height: 90vh; overflow-y: auto;">
            <h3 style="color: #e91e63; text-align: center; margin: 0;">Resumo e Entrega</h3>
            
            <div id="lista-resumo-itens" style="background: #f9f9f9; padding: 10px; border-radius: 10px; border: 1px solid #eee; max-height: 150px; overflow-y: auto;">
                </div>

            <hr style="border: 0.5px solid #eee; margin: 5px 0;">

            <input type="text" id="cliente-nome" placeholder="Seu Nome Completo" style="padding:12px; border-radius:8px; border:1px solid #ddd; outline:none;">
            <input type="tel" id="cliente-telefone" placeholder="Seu WhatsApp (Ex: 11 99999-9999)" style="padding:12px; border-radius:8px; border:1px solid #ddd; outline:none;">
            <input type="text" id="cliente-endereco" placeholder="Endereço de Entrega (Rua, Nº, Bairro)" style="padding:12px; border-radius:8px; border:1px solid #ddd; outline:none;">
            
            <select id="cliente-pagamento" style="padding:12px; border-radius:8px; border:1px solid #ddd; outline:none; background:white;">
                <option value="" disabled selected>Forma de Pagamento</option>
                <option value="Pix">Pix</option>
                <option value="Cartão de Crédito">Cartão de Crédito</option>
                <option value="Cartão de Débito">Cartão de Débito</option>
                <option value="Dinheiro">Dinheiro Vivo</option>
            </select>

            <div style="display:flex; gap:10px; margin-top:10px;">
                <button type="button" onclick="fecharModalCheckout()" style="flex:1; padding:12px; border-radius:8px; border:none; background:#eee; color:#333; font-weight:bold; cursor:pointer;">Voltar</button>
                <button type="button" onclick="processarEnvioWhatsApp()" style="flex:1; padding:12px; border-radius:8px; border:none; background:#25D366; color:white; font-weight:bold; cursor:pointer;">Enviar Pedido 🚀</button>
            </div>
        </div>
    </div>

    <style>
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .item-opcional-card { display:flex; justify-content:space-between; align-items:center; padding:12px; border-bottom:1px solid #eee; cursor:pointer; }
        .item-opcional-card:last-child { border-bottom:none; }
    </style>

    <script src="app.js"></script>

</body>
</html>
