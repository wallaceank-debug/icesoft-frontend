<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icesoft - Cardápio Delivery</title>
    <link rel="stylesheet" href="/cardapio/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body style="background-color: #ffffff;">

    <header style="background-color: #e91e63; padding: 30px 20px; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; text-align: center; box-shadow: 0 4px 10px rgba(233, 30, 99, 0.3);">
        <h1 style="color: white; font-size: 1.8rem; margin-bottom: 20px;">🍦 Icesoft</h1>
        <input type="text" placeholder="O que você quer pedir hoje?" style="width: 100%; padding: 15px 20px; border-radius: 30px; border: none; outline: none; font-size: 1rem; font-family: 'Poppins', sans-serif; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    </header>

    <section style="display: flex; justify-content: center; gap: 20px; margin: 30px 0;">
        <div style="width: 65px; height: 65px; border-radius: 50%; border: 3px solid #e91e63; background-color: #fff0f5;"></div>
        <div style="width: 65px; height: 65px; border-radius: 50%; border: 3px solid #e91e63; background-color: #fff0f5;"></div>
        <div style="width: 65px; height: 65px; border-radius: 50%; border: 3px solid #e91e63; background-color: #fff0f5;"></div>
        <div style="width: 65px; height: 65px; border-radius: 50%; border: 3px solid #e91e63; background-color: #fff0f5;"></div>
    </section>

    <main id="lista-produtos" style="padding: 0 20px 120px 20px; display: flex; flex-direction: column; gap: 20px;">
        </main>

    <div id="carrinho-flutuante" class="carrinho-oculto">
        <div class="carrinho-info">
            <span id="carrinho-qtd">0 itens</span>
            <span id="carrinho-total">R$ 0,00</span>
        </div>
        <button onclick="finalizarPedidoWhatsApp()" class="btn-whatsapp">Fazer Pedido 📱</button>
    </div>

    <div id="modal-checkout" class="modal-oculto">
        <div class="modal-conteudo">
            <h3 style="color: #e91e63; text-align: center; margin-bottom: 10px;">Detalhes da Entrega</h3>
            
            <input type="text" id="cliente-nome" placeholder="Seu Nome Completo" required>
            <input type="text" id="cliente-endereco" placeholder="Endereço de Entrega (Rua, Nº, Bairro)" required>
            
            <select id="cliente-pagamento">
                <option value="" disabled selected>Forma de Pagamento</option>
                <option value="Pix">Pix</option>
                <option value="Cartão de Crédito">Cartão de Crédito</option>
                <option value="Cartão de Débito">Cartão de Débito</option>
                <option value="Dinheiro">Dinheiro Vivo</option>
            </select>

            <div class="modal-botoes">
                <button onclick="fecharModal()" class="btn-cancelar">Voltar</button>
                <button onclick="enviarPedidoFinal()" class="btn-confirmar">Enviar Pedido 🚀</button>
            </div>
        </div>
    </div>

    <script src="/cardapio/app.js"></script>
</body>
</html>
