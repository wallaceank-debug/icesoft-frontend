<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icesoft - Cardápio Delivery</title>
    <link rel="stylesheet" href="/cardapio/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header style="background-color: #e91e63; color: white; padding: 20px; text-align: center;">
        <h1>🍦 Icesoft Delivery</h1>
        <p>Os melhores sorvetes direto na sua casa!</p>
    </header>

    <main id="lista-produtos" style="padding: 20px; padding-bottom: 100px; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center;">
        </main>

    <div id="carrinho-flutuante" class="carrinho-oculto">
        <div class="carrinho-info">
            <span id="carrinho-qtd">0 itens</span>
            <span id="carrinho-total">R$ 0,00</span>
        </div>
        <button onclick="finalizarPedidoWhatsApp()" class="btn-whatsapp">Fazer Pedido 📱</button>
    </div>

    <div id="modal-checkout" class="modal-oculto">
        <div class="modal-conteudo">
            <h3 style="color: #e91e63; text-align: center; margin-bottom: 10px;">Detalhes da Entrega</h3>
            
            <input type="text" id="cliente-nome" placeholder="Seu Nome Completo" required>
            <input type="text" id="cliente-endereco" placeholder="Endereço de Entrega (Rua, Nº, Bairro)" required>
            
            <select id="cliente-pagamento">
                <option value="" disabled selected>Forma de Pagamento</option>
                <option value="Pix">Pix</option>
                <option value="Cartão de Crédito">Cartão de Crédito</option>
                <option value="Cartão de Débito">Cartão de Débito</option>
                <option value="Dinheiro">Dinheiro Vivo</option>
            </select>

            <div class="modal-botoes">
                <button onclick="fecharModal()" class="btn-cancelar">Voltar</button>
                <button onclick="enviarPedidoFinal()" class="btn-confirmar">Enviar Pedido 🚀</button>
            </div>
        </div>
    </div>

    <script src="/cardapio/app.js"></script>
</body>
</html>
